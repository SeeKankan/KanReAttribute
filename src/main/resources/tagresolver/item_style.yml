start_delimiter: "|-------"
end_delimiter: "-------|"
indent: "--"

empty_item_introduction: "<gray>无</gray>"

each_item_attribute: "<attribute_display_name>: <attribute_value>"
each_item_slot_delimiter: "<white> | </white>"
format_item_name: "<white><item_display_name></white>"

format_item_slots: |-
  <item_slots>

format_material_basic_info: |-
  <white><start_delimiter>[<green><bold>基本信息</bold></green>]<end_delimiter></white><newline>
  <gray>类型: </gray><item_category><newline>
format_gear_basic_info: |-
  <white><start_delimiter>[<green><bold>基本信息</bold></green>]<end_delimiter></white><newline>
  <gray>类型: </gray><item_category><newline>
  <gray>槽位: </gray><format_item_slots><newline>
format_item_introduction: |-
  <white><start_delimiter>[<red><bold>物品介绍</bold></red>]<end_delimiter></white><newline>
  <item_introduction>
format_item_attribute: |-
  <white><start_delimiter>[<yellow><bold>物品属性</bold></yellow>]<end_delimiter></white><newline>
  <item_attributes>
  

format_full_material_lore: |-
  <italic:false>
  <format_item_introduction><reset><newline>
format_full_gear_lore: |-
  <italic:false>
  <format_gear_basic_info><reset><newline>
  <italic:false>
  <format_item_introduction><reset><newline>
  <italic:false>
  <format_item_attribute><reset><newline>
