import org.jetbrains.kotlin.gradle.tasks.KotlinCompile
import com.github.jengelman.gradle.plugins.shadow.transformers.PropertiesFileTransformer

plugins {
    id 'java'
    id 'org.jetbrains.kotlin.jvm' version '2.2.20'
    id("com.gradleup.shadow") version "8.3.0"
}

group 'io.seekankan.github'
version '1.0-SNAPSHOT'

def jvmVersion = "1.8"

build {
    dependsOn(shadowJar)
}
shadowJar {
//    relocate("de.tr7zw.changeme.nbtapi", "io.seekankan.github.kansky.nbtapi")

    dependencies {
//        exclude(dependency('com.github.shynixn.kspigot:.*'))
//        exclude(dependency('org.spigotmc:.*'))
    }
    exclude 'META-INF/*.SF', 'META-INF/*.DSA', 'META-INF/*.RSA'
    exclude '**/module-info.class'
    exclude 'META-INF/maven/**', 'META-INF/versions/**', 'META-INF/licenses/**'
    entryCompression = ZipEntryCompression.STORED
    zip64 = true

    relocate 'kotlin.reflect', 'io.seekankan.github.kanreattribute.shaded.kotlin.reflect'
//    reloacte 'kotlinx.coroutines', 'io.seekankan.github.kanreattribute.shaded.coroutines'
