    relocate 'org.koin', 'io.seekankan.github.kanreattribute.shaded.koin'
    relocate 'net.axay.kspigot', 'io.seekankan.github.kanreattribute.shaded.kspigot'

//    relocate '_COROUTINE', 'io.seekankan.github.kanreattribute.shaded._COROUTINE'
    relocate 'co.touchlab.stately', 'io.seekankan.github.kanreattribute.shaded.stately'
    relocate 'net.wesjd', 'io.seekankan.github.kanreattribute.shaded.wesjd'
    relocate 'org.intellij', 'io.seekankan.github.kanreattribute.shaded.intellij'
    relocate 'org.jetbrains', 'io.seekankan.github.kanreattribute.shaded.jetbrains'
    relocate 'com.fasterxml', 'io.seekankan.github.kanreattribute.shaded.com.fasterxml'


    //Adventure api
    relocate 'net.kyori', 'io.seekankan.github.kanreattribute.shaded.kyori'
//    relocate 'net.kyori.adventure.text.minimessage', 'io.seekankan.github.kanreattribute.shaded.kyori.adventure.text.minimessage'
//    relocate 'net.kyori.adventure.text.serializer.gson', 'io.seekankan.github.kanreattribute.shaded.kyori.adventure.text.serializer.gson'

    relocate 'io.papermc.lib', 'io.seekankan.github.kanreattribute.shaded.paperlib'

//    filesMatching('kotlin/**') {
//        it.path = "io/seekankan/github/kanreattribute/shaded/kotlin/${it.name}"
//    }
//    transform(PropertiesFileTransformer) {
//        paths = ['META-INF/*.kotlin_module']
//
//        mergeStrategy = {entries ->
//            "META-INF/io.seekankan.github.kanreattribute.shaded.kotlin.kotlin_module"
//        }
//        keyTransformer = { key ->
//            key.replaceAll('kotlin\\.', 'io.seekankan.github.kanreattribute.shaded.kotlin.')
//        }
//    }
//    from {
//        configurations.compileClasspath.
//    }
    def toShade = [
            'org.yaml.snakeyaml'
    ]
    toShade.forEach {
        relocate(it, "io.seekankan.github.kanreattribute.shaded.$it")
    }
    mergeServiceFiles()
}
task copyPlugin(type:Copy) {
//    from file("${rootDir}/build/libs/kansky-1.0-SNAPSHOT-all.jar")
    from file("${rootDir}/build/libs/kanreattribute-" + version + "-all.jar")
    into file("${rootDir}/testserver/plugins")
}


repositories {
    maven { url 'https://maven.aliyun.com/repository/public' }
    maven { url 'https://oss.sonatype.org/content/repositories/snapshots' }
    maven { url 'https://hub.spigotmc.org/nexus/content/repositories/snapshots/' }
    maven { url 'https://mvn.lumine.io/repository/maven-public/' }
    maven { url 'https://repo.papermc.io/repository/maven-public/' }
//    maven { url 'https://papermc.io/repo/repository/maven-public/'}
    maven {
        name = "CodeMC"
        url = uri("https://repo.codemc.io/repository/maven-public/")
    }
    maven {
        url = 'https://repo.extendedclip.com/releases/'
    }
    maven { //kspigot
        url = 'https://jitpack.io'
    }

    mavenCentral()
}

